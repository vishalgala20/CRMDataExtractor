<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist CRM Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Scrollbar styling for table */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Navigation / Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <h1 class="text-xl font-semibold text-gray-900">CRM Data Extractor</h1>
        </div>
        
        <!-- API Key Block -->
        <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 px-3 py-2 rounded-full shadow-inner transition-colors duration-200 focus-within:border-blue-400 focus-within:bg-white">
            <div id="api-status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)] transition-colors duration-300" title="API Status"></div>
            <input type="password" id="api-key-input" placeholder="Enter Gemini API Key..." class="bg-transparent border-none outline-none text-sm w-48 text-gray-700 placeholder-gray-400">
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl w-full mx-auto p-6 flex flex-col gap-6">
        
        <!-- Upload Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-medium mb-4">1. Upload CRM Images <span class="text-sm font-normal text-gray-500 ml-2">(Max 20 images)</span></h2>
            
            <div id="drop-zone" class="w-full border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:bg-gray-50 hover:border-blue-400 transition cursor-pointer flex flex-col items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p class="text-gray-600 font-medium">Drag & drop images here, or click to browse</p>
                <p class="text-xs text-gray-400">Supports JPG, PNG, WEBP</p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>

            <!-- Thumbnails Preview -->
            <div id="thumbnails-container" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4 mt-6 hidden">
                <!-- Images injected here -->
            </div>
            
            <!-- Actions -->
            <div class="mt-6 flex justify-between items-center hidden" id="action-bar">
                <span id="file-count" class="text-sm text-gray-500 font-medium">0 images selected</span>
                <button id="extract-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-medium transition shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Extract Data
                </button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="output-section" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                <h2 class="text-lg font-medium">2. Extracted Data</h2>
                <div class="flex gap-2">
                    <button id="copy-excel-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy for Excel
                    </button>
                    <button id="download-csv-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2 border border-gray-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download CSV
                    </button>
                </div>
            </div>
            
            <div id="table-container" class="overflow-x-auto rounded-lg border border-gray-200 max-h-96">
                <!-- Dynamic table goes here -->
            </div>
        </div>

    </main>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-6 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-24 opacity-0 z-50 font-medium flex items-center gap-3">
        <span id="toast-message">Notification</span>
    </div>

    <!-- Chatbot FAB -->
    <button id="chat-fab" class="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 transition z-40 focus:outline-none flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>

    <!-- Chatbot Window -->
    <div id="chat-window" class="fixed bottom-24 right-6 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-40" style="height: 450px;">
        <div class="bg-blue-600 text-white p-4 font-medium flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                <span>Data Assistant</span>
            </div>
            <button id="close-chat" class="text-white hover:text-gray-200 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="chat-messages" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3 text-sm bg-gray-50">
            <div class="bg-blue-100 p-3 rounded-lg rounded-tl-none self-start max-w-[85%] text-blue-900 shadow-sm">
                Hi! Upload and extract some CRM images, then you can ask me questions about the data here.
            </div>
        </div>
        <div class="p-3 border-t border-gray-200 flex gap-2 bg-white">
            <input type="text" id="chat-input" class="flex-grow bg-gray-100 border-none rounded-full px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ask about the data...">
            <button id="chat-send" class="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700 transition focus:outline-none shadow-sm flex items-center justify-center min-w-[36px]">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <!-- Hidden Textarea for copying to clipboard -->
    <textarea id="clipboard-area" class="sr-only" aria-hidden="true" tabindex="-1"></textarea>

    <script>
        // --- State Management ---
        const apiKey = ""; // Built-in fallback to satisfy environment constraints if applicable
        let isApiVerified = false;
        let selectedFiles = [];
        let extractedDataArray = [];

        // Define the exact required column headers and order
        const expectedHeaders = [
            "Purchase Date", "Project", "Residential Building Number", "Plot Area (sqm)", 
            "Gross Area (sqm)", "Email", "Passport Number", "Joint Purchaser", 
            "Joint Purchaser Name", "Corporation Details", "Correspondence Address", 
            "Tel", "Fax", "Nationality", "Plot Number", "Residential Building Type", 
            "Plot Area (sqft)", "Gross Area (sqft)", "Sole/First Purchaser", "Mobile"
        ];

        // --- DOM Elements ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const thumbnailsContainer = document.getElementById('thumbnails-container');
        const actionBar = document.getElementById('action-bar');
        const fileCountTxt = document.getElementById('file-count');
        const extractBtn = document.getElementById('extract-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiStatusDot = document.getElementById('api-status-dot');
        const outputSection = document.getElementById('output-section');
        const tableContainer = document.getElementById('table-container');
        const copyExcelBtn = document.getElementById('copy-excel-btn');
        const downloadCsvBtn = document.getElementById('download-csv-btn');

        // Chat DOM Elements
        const chatFab = document.getElementById('chat-fab');
        const chatWindow = document.getElementById('chat-window');
        const closeChatBtn = document.getElementById('close-chat');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send');
        const chatMessages = document.getElementById('chat-messages');

        // --- Event Listeners ---
        
        // API Key Live Status
        let apiTypingTimer;
        apiKeyInput.addEventListener('input', (e) => {
            clearTimeout(apiTypingTimer);
            const key = e.target.value.trim();
            
            if (key.length === 0) {
                setApiStatus('red');
                return;
            }
            
            setApiStatus('yellow'); // Shows it is checking/verifying
            apiTypingTimer = setTimeout(() => verifyApiKey(key), 800);
        });

        function setApiStatus(status) {
            apiStatusDot.className = 'w-2.5 h-2.5 rounded-full transition-colors duration-300';
            if (status === 'red') {
                apiStatusDot.classList.add('bg-red-500', 'shadow-[0_0_8px_rgba(239,68,68,0.6)]');
                isApiVerified = false;
            } else if (status === 'yellow') {
                apiStatusDot.classList.add('bg-yellow-400', 'shadow-[0_0_8px_rgba(250,204,21,0.6)]');
                isApiVerified = false;
            } else if (status === 'green') {
                apiStatusDot.classList.add('bg-green-500', 'shadow-[0_0_8px_rgba(34,197,94,0.6)]');
                isApiVerified = true;
            }
        }

        async function verifyApiKey(key) {
            try {
                // Now using gemini-2.5-flash standard model to verify the key.
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                });
                
                if (response.ok) {
                    setApiStatus('green');
                    showToast("API Key connected successfully!", "success");
                } else {
                    const errData = await response.json();
                    console.error("API Verification Failed - Reason:", errData);
                    setApiStatus('red');
                    const errorMessage = errData.error?.message || "Invalid API Key";
                    showToast(`Google API Error: ${errorMessage}`, "error");
                }
            } catch (error) {
                console.error("API Verification Network Error:", error);
                setApiStatus('red');
                showToast("Network Error: Could not connect to Google API.", "error");
            }
        }

        // Drag and Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            handleFiles(e.dataTransfer.files);
        });

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            
            if (selectedFiles.length + newFiles.length > 20) {
                showToast("Maximum of 20 images allowed.", "error");
                return;
            }

            selectedFiles = [...selectedFiles, ...newFiles];
            updateThumbnails();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateThumbnails();
        }

        function updateThumbnails() {
            if (selectedFiles.length === 0) {
                thumbnailsContainer.classList.add('hidden');
                actionBar.classList.add('hidden');
                return;
            }

            thumbnailsContainer.classList.remove('hidden');
            actionBar.classList.remove('hidden');
            fileCountTxt.textContent = `${selectedFiles.length} image${selectedFiles.length > 1 ? 's' : ''} selected`;
            
            thumbnailsContainer.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const url = URL.createObjectURL(file);
                const div = document.createElement('div');
                div.className = "relative group rounded-lg overflow-hidden border border-gray-200 aspect-square bg-gray-100";
                div.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover" alt="CRM Thumbnail">
                    <button onclick="removeFile(${index})" class="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                `;
                thumbnailsContainer.appendChild(div);
            });
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ mimeType: file.type, data: reader.result.split(',')[1] });
                reader.onerror = error => reject(error);
            });
        }

        extractBtn.addEventListener('click', processImages);

        // Fetch with exponential backoff
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errData}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function processImages() {
            const userKey = apiKeyInput.value.trim();
            const activeKey = userKey || apiKey;

            if (!activeKey || (!isApiVerified && !apiKey)) {
                showToast("Please enter a valid, verified Gemini API Key first.", "error");
                apiKeyInput.focus();
                return;
            }

            if (selectedFiles.length === 0) return;

            // UI Loading state
            const originalBtnHtml = extractBtn.innerHTML;
            extractBtn.innerHTML = `<div class="spinner w-5 h-5 mr-2"></div> Extracting Data...`;
            extractBtn.disabled = true;
            extractBtn.classList.replace('bg-blue-600', 'bg-blue-400');
            outputSection.classList.add('hidden');

            try {
                // Prepare Image Payload
                const parts = [
                    { 
                        text: `You are an expert data entry assistant. Analyze these CRM screenshots/images. Extract ALL tabular, structured, or contact data you can find. Output the extracted data as a JSON array of objects. \n\nCRITICAL INSTRUCTION: You MUST use exactly these specific keys for every object in the array, keeping this exact naming and casing: ${JSON.stringify(expectedHeaders)}. If a specific piece of data is not found in the image, assign an empty string ("") to that key. Do not invent data.` 
                    }
                ];

                for (const file of selectedFiles) {
                    const b64 = await getBase64(file);
                    parts.push({
                        inlineData: { mimeType: b64.mimeType, data: b64.data }
                    });
                }

                const payload = {
                    contents: [{ role: "user", parts: parts }],
                    generationConfig: {
                        responseMimeType: "application/json" // Enforces pure JSON output from Gemini
                    }
                };

                // Using gemini-2.5-flash for maximum compatibility
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;

                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Parse JSON from API
                const jsonString = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!jsonString) throw new Error("No data returned from API");
                
                extractedDataArray = JSON.parse(jsonString);
                
                // Ensure it's an array
                if (!Array.isArray(extractedDataArray)) {
                    if (typeof extractedDataArray === 'object') {
                        extractedDataArray = [extractedDataArray]; // Wrap single objects
                    } else {
                        throw new Error("Invalid format returned.");
                    }
                }

                renderTable(extractedDataArray);
                outputSection.classList.remove('hidden');
                outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                showToast("Extraction Complete!");

                // Open chat automatically to prompt user interaction
                if(chatWindow.classList.contains('opacity-0')) {
                    setTimeout(() => toggleChat(), 1500);
                }

            } catch (error) {
                console.error("Extraction failed:", error);
                showToast(`Error: ${error.message.substring(0, 100)}`, "error");
            } finally {
                // Restore button state
                extractBtn.innerHTML = originalBtnHtml;
                extractBtn.disabled = false;
                extractBtn.classList.replace('bg-blue-400', 'bg-blue-600');
            }
        }

        function renderTable(dataArray) {
            if (!dataArray || dataArray.length === 0) {
                tableContainer.innerHTML = '<div class="p-6 text-center text-gray-500">No structured data found in the images.</div>';
                return;
            }

            let html = `
            <table class="min-w-full divide-y divide-gray-200 text-sm whitespace-nowrap">
                <thead class="bg-gray-50 sticky top-0">
                    <tr>`;
            
            expectedHeaders.forEach(h => {
                html += `<th class="px-6 py-3 text-left font-semibold text-gray-700 tracking-wider border-b">${h}</th>`;
            });
            
            html += `</tr></thead><tbody class="bg-white divide-y divide-gray-200">`;
            
            dataArray.forEach(row => {
                html += '<tr class="hover:bg-gray-50 transition-colors">';
                expectedHeaders.forEach(h => {
                    let cellVal = row[h];
                    if (cellVal === null || cellVal === undefined) cellVal = '';
                    if (typeof cellVal === 'object') cellVal = JSON.stringify(cellVal);
                    html += `<td class="px-6 py-3 text-gray-600">${cellVal}</td>`;
                });
                html += '</tr>';
            });
            
            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
        }

        // --- Export Functions ---

        function generateTSV(dataArray) {
            if (!dataArray || dataArray.length === 0) return '';
            
            let tsv = expectedHeaders.join('\t') + '\n';
            dataArray.forEach(row => {
                const values = expectedHeaders.map(header => {
                    let val = row[header] !== undefined && row[header] !== null ? row[header] : '';
                    // Replace tabs and newlines within cells to maintain grid structure
                    val = String(val).replace(/\t/g, ' ').replace(/\n/g, ' '); 
                    return val;
                });
                tsv += values.join('\t') + '\n';
            });
            return tsv;
        }

        function copyToExcel() {
            const tsvData = generateTSV(extractedDataArray);
            if (!tsvData) return;

            const textarea = document.getElementById('clipboard-area');
            textarea.value = tsvData;
            textarea.select();
            
            try {
                // Using execCommand as it avoids sandbox/iframe clipboard API restrictions
                document.execCommand('copy');
                showToast("Data copied! You can now Paste (Ctrl+V) directly into Excel.");
            } catch (err) {
                showToast("Copy failed. Please download the CSV instead.", "error");
            }
        }

        function downloadCSV() {
            if (!extractedDataArray || extractedDataArray.length === 0) return;
            
            let csv = expectedHeaders.join(',') + '\n';
            extractedDataArray.forEach(row => {
                const values = expectedHeaders.map(header => {
                    let val = row[header] !== undefined && row[header] !== null ? String(row[header]) : '';
                    // Escape quotes and wrap in quotes if contains commas or quotes
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = `"${val.replace(/"/g, '""')}"`;
                    }
                    return val;
                });
                csv += values.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "crm_data_extract.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        chatFab.addEventListener('click', toggleChat);
        closeChatBtn.addEventListener('click', toggleChat);
        chatSendBtn.addEventListener('click', handleChatSubmit);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChatSubmit();
        });

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            
            if(type === 'error') {
                toast.classList.replace('bg-gray-900', 'bg-red-600');
            } else {
                toast.classList.replace('bg-red-600', 'bg-gray-900');
            }

            toast.classList.remove('translate-y-24', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 4000);
        }

        function toggleChat() {
            const isHidden = chatWindow.classList.contains('opacity-0');
            if (isHidden) {
                chatWindow.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                chatInput.focus();
            } else {
                chatWindow.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }
        }

        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-3 rounded-lg shadow-sm max-w-[85%] ${
                isUser 
                ? 'bg-blue-600 text-white self-end rounded-tr-none' 
                : 'bg-white text-gray-800 self-start rounded-tl-none border border-gray-200'
            }`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        async function handleChatSubmit() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            const userKey = apiKeyInput.value.trim();
            const activeKey = userKey || apiKey;

            if (!activeKey || (!isApiVerified && !apiKey)) {
                appendMessage("Please enter a valid API Key to use the chat.");
                return;
            }

            // UI Updates
            appendMessage(text, true);
            chatInput.value = '';
            chatInput.disabled = true;
            chatSendBtn.disabled = true;
            
            const loadingMsg = appendMessage("Thinking...");
            loadingMsg.classList.add('animate-pulse');

            try {
                let contextPrompt = "";
                if (extractedDataArray && extractedDataArray.length > 0) {
                    contextPrompt = `You are a helpful data assistant. Here is the CRM data extracted recently in JSON format: ${JSON.stringify(extractedDataArray)}. Answer the user's question based strictly on this data. If the answer isn't in the data, let them know.\n\nUser Question: ${text}`;
                } else {
                    contextPrompt = `The user hasn't extracted any data yet. Politely tell them to upload images and extract the data first so you can analyze it. User Question: ${text}`;
                }

                // Using gemini-2.5-flash for maximum compatibility
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
                
                const response = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: contextPrompt }] }] })
                });

                const reply = response.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't process that.";
                
                chatMessages.removeChild(loadingMsg);
                appendMessage(reply, false);

            } catch (error) {
                console.error("Chat Error:", error);
                chatMessages.removeChild(loadingMsg);
                appendMessage("Error: Could not reach the AI.", false);
            } finally {
                chatInput.disabled = false;
                chatSendBtn.disabled = false;
                chatInput.focus();
            }
        }
    </script>
</body>
</html>
